<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLemples</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #ui {
        position: fixed;
        top: 12px;
        right: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-family: monospace;
        font-size: 12px;
        color: #ccc;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }
      body:hover #ui {
        opacity: 1;
        pointer-events: all;
      }

      #ui label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }
      #ui input[type="range"] {
        width: 100px;
      }
      #ui button {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #ccc;
        padding: 3px 8px;
        cursor: pointer;
        font-family: monospace;
        font-size: 12px;
      }
      #ui button:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      #fps {
        position: fixed;
        bottom: 8px;
        left: 8px;
        font-family: monospace;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        pointer-events: none;
      }

      #texname {
        position: fixed;
        bottom: 8px;
        right: 8px;
        font-family: monospace;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        pointer-events: none;
      }

      #dropzone {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        font-family: monospace;
        font-size: 18px;
        color: rgba(255, 255, 255, 0.7);
        border: 3px dashed rgba(255, 255, 255, 0.3);
        pointer-events: none;
      }
      body.dragging #dropzone {
        display: flex;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>

    <div id="ui">
      <!-- Slider positions are set at startup from config.yaml (see bindUI). -->
      <label
        >Motion blur <input type="range" id="blur" min="0" max="10" step="1"
      /></label>
      <label
        >Warp amount <input type="range" id="warp" min="0" max="100" step="1"
      /></label>
      <label
        >Zoom <input type="range" id="zoom" min="1" max="300" step="1"
      /></label>
      <label
        >Speed <input type="range" id="speed" min="10" max="300" step="1"
      /></label>
      <label
        >Tex interval<input type="range" id="texint" min="5" max="120" step="5"
      /></label>
      <button id="btnNextTex">Next texture (Space)</button>
      <button id="btnPause">Pause (P)</button>
      <button id="btnFullscreen">Fullscreen (F)</button>
      <div style="color: rgba(255, 255, 255, 0.35); margin-top: 4px">
        Drop images to load them
      </div>
    </div>

    <div id="fps"></div>
    <div id="texname"></div>
    <div id="dropzone">Drop images here</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
